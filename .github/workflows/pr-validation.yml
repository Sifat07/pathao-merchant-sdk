name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run type-check

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Validate package.json fields
        run: |
          node -e "
            const pkg = require('./package.json');
            const required = ['name', 'version', 'description', 'main', 'module', 'types', 'exports', 'files'];
            const missing = required.filter(f => !pkg[f]);
            if (missing.length) { console.error('Missing fields:', missing); process.exit(1); }
            console.log('package.json OK');
          "

      - name: Check bundle sizes
        run: |
          ls -lh dist/index.js dist/index.mjs dist/index.d.ts
          ls -lh dist/webhooks.js dist/webhooks.mjs dist/webhooks.d.ts

      - name: Comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            const passed = '${{ job.status }}' === 'success';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `## ${passed ? '✅' : '❌'} PR Validation — \`${pkg.name}@${pkg.version}\``,
                '',
                passed
                  ? '**All checks passed:** lint · type-check · tests · build · package validation'
                  : '**One or more checks failed** — see job logs for details.',
              ].join('\n')
            });
